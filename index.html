<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR3000 — Painel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a237e; }
    .login-card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-card h1 { font-size: 24px; color: #1a237e; margin-bottom: 8px; }
    .login-card p { color: #666; margin-bottom: 32px; font-size: 14px; }
    .login-card input { width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; margin-bottom: 16px; outline: none; }
    .login-card input:focus { border-color: #1a237e; }
    .btn-primary { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #283593; }
    .erro { color: #e53935; font-size: 13px; margin-top: 8px; text-align: center; }
    #dashboard { display: none; }
    .topbar { background: #1a237e; color: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar h1 { font-size: 20px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .atualizado { font-size: 12px; color: rgba(255,255,255,0.6); }
    .btn-logout { padding: 8px 16px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; cursor: pointer; font-size: 13px; }
    .tabs { display: flex; background: white; border-bottom: 2px solid #e0e0e0; padding: 0 32px; }
    .tab { padding: 16px 24px; cursor: pointer; font-weight: 600; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #1a237e; border-bottom-color: #1a237e; }
    .content { padding: 24px 32px; max-width: 1200px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .section-title { font-size: 18px; font-weight: 700; color: #1a237e; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .badge { background: #1a237e; color: white; border-radius: 12px; padding: 2px 10px; font-size: 13px; }
    .badge.orange { background: #f57c00; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid #1a237e; }
    .card.pendente { border-left-color: #f57c00; }
    .card.reserva-hoje { background: #f3f4ff; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .card-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
    .card-sub { color: #666; font-size: 13px; margin-bottom: 4px; }
    .chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .chip.pendente { background: #fff3e0; color: #f57c00; }
    .chip.hoje { background: #e8eaf6; color: #1a237e; }
    .data-header { background: #e8eaf6; color: #1a237e; font-weight: 700; font-size: 13px; padding: 8px 16px; border-radius: 20px; margin: 16px 0 8px; display: inline-block; }
    .data-header.hoje { background: #1a237e; color: white; }
    .foto-thumb { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #e0e0e0; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .modal-close { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .empty { text-align: center; padding: 48px; color: #999; }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 48px; color: #666; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #1a237e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; margin-top: 8px; }
    .info-item { display: flex; gap: 8px; align-items: flex-start; }
    .info-label { color: #999; font-size: 12px; }
    .info-value { font-weight: 600; font-size: 14px; }

    /* RELATÓRIOS */
    .relatorio-box { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .relatorio-box h3 { color: #1a237e; margin-bottom: 16px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 600; color: #444; }
    .form-group input, .form-group select { padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; min-width: 150px; }
    .form-group input:focus, .form-group select:focus { border-color: #1a237e; }
    .btn-pdf { padding: 10px 20px; background: #c62828; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .btn-pdf:hover { background: #b71c1c; }
    .btn-pdf:disabled { background: #ccc; cursor: not-allowed; }
    @media (max-width: 600px) { .content { padding: 16px; } .tabs { padding: 0 16px; } .topbar { padding: 12px 16px; } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>🏢 AR3000</h1>
    <p>Painel de visualização — acesso administrativo</p>
    <input type="email" id="email" placeholder="Email" value="portaria@condominioDesk.com">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn-primary" onclick="login()">Entrar</button>
    <p class="erro" id="erro-login"></p>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <h1>🏢 AR3000</h1>
    <div class="topbar-right">
      <span class="atualizado" id="atualizado-em"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="mudarTab('encomendas')">📦 Encomendas</div>
    <div class="tab" onclick="mudarTab('reservas')">🗓️ Reservas</div>
    <div class="tab" onclick="mudarTab('relatorios')">📄 Relatórios</div>
  </div>
  <div class="content">
    <div id="tab-encomendas" class="tab-content active">
      <div id="encomendas-content" class="loading"><div class="spinner"></div>Carregando...</div>
    </div>
    <div id="tab-reservas" class="tab-content">
      <div id="reservas-content" class="loading"><div class="spinner"></div>Carregando...</div>
    </div>
    <div id="tab-relatorios" class="tab-content">
      <div class="section-title">📄 Relatórios de Uso das Salas Comuns</div>

      <!-- Relatório por dia -->
      <div class="relatorio-box">
        <h3>📅 Relatório por Dia Específico</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="rel-dia-data">
          </div>
          <button class="btn-pdf" onclick="gerarRelatorioDia()">📄 Gerar PDF</button>
        </div>
      </div>

      <!-- Relatório por mês -->
      <div class="relatorio-box">
        <h3>📆 Relatório Mensal Geral</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Mês/Ano</label>
            <input type="month" id="rel-mes-data">
          </div>
          <button class="btn-pdf" onclick="gerarRelatorioMes()">📄 Gerar PDF</button>
        </div>
      </div>

      <!-- Relatório por sala -->
      <div class="relatorio-box">
        <h3>🏢 Relatório por Sala (Condômino)</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Sala</label>
            <select id="rel-sala-numero">
              <option value="">Selecione...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Período</label>
            <select id="rel-sala-tipo">
              <option value="dia">Dia específico</option>
              <option value="mes">Mês</option>
            </select>
          </div>
          <div class="form-group" id="rel-sala-data-group">
            <label id="rel-sala-data-label">Data</label>
            <input type="date" id="rel-sala-data">
          </div>
          <button class="btn-pdf" onclick="gerarRelatorioSala()">📄 Gerar PDF</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-foto" onclick="fecharFoto()">
  <button class="modal-close" onclick="fecharFoto()">✕</button>
  <img id="modal-img" src="" alt="Foto">
</div>

<script>
const SUPABASE_URL = 'https://aatpmxexgrtknnafjhqu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFhdHBteGV4Z3J0a25uYWZqaHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDkyNzIsImV4cCI6MjA4ODkyNTI3Mn0.ugx_4mE_ZSz7FE0rwOvsw5R4Psg27hefsG0TTIEYDbc';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
let intervalo = null, espacosCache = [], salasCache = [];

async function login() {
  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;
  document.getElementById('erro-login').textContent = '';
  try {
    const { error } = await db.auth.signInWithPassword({ email, password: senha });
    if (error) throw error;
    mostrarDashboard();
  } catch(e) { document.getElementById('erro-login').textContent = 'Email ou senha incorretos.'; }
}

async function logout() {
  await db.auth.signOut();
  clearInterval(intervalo);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function mostrarDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  carregarEspacos().then(() => { carregarTudo(); intervalo = setInterval(carregarTudo, 30000); });
  carregarSalasSelect();
}

async function carregarEspacos() {
  const { data } = await db.from('espacos_comuns').select();
  espacosCache = data || [];
}

async function carregarSalasSelect() {
  const { data } = await db.from('salas').select('numero, nome_empresa').order('numero', { ascending: true });
salasCache = (data || []).sort((a, b) => parseInt(a.numero) - parseInt(b.numero));
  const sel = document.getElementById('rel-sala-numero');
  salasCache.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.numero;
    opt.textContent = `${s.numero}${s.nome_empresa ? ' — ' + s.nome_empresa : ''}`;
    sel.appendChild(opt);
  });
}

document.getElementById('rel-sala-tipo').addEventListener('change', function() {
  const label = document.getElementById('rel-sala-data-label');
  const input = document.getElementById('rel-sala-data');
  if (this.value === 'mes') { input.type = 'month'; label.textContent = 'Mês'; }
  else { input.type = 'date'; label.textContent = 'Data'; }
});

function nomesEspacos(ids) {
  return ids.map(id => { const e = espacosCache.find(e => e.id === id); return e ? e.nome : id; }).join(' + ');
}

async function carregarTudo() {
  await Promise.all([carregarEncomendas(), carregarReservas()]);
  document.getElementById('atualizado-em').textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;
}

async function carregarEncomendas() {
  const { data: encomendas } = await db.from('encomendas').select('*, salas(numero, nome_empresa)').eq('status', 'pendente').order('criado_em', { ascending: false });
  const el = document.getElementById('encomendas-content');
  if (!encomendas?.length) { el.innerHTML = '<div class="empty"><div class="icon">📭</div>Nenhuma encomenda pendente</div>'; return; }
  el.innerHTML = `<div class="section-title">📦 Encomendas Pendentes <span class="badge orange">${encomendas.length}</span></div>
  ${encomendas.map(e => `<div class="card pendente"><div class="card-header"><div>
    <div class="card-title">${e.nome_destinatario}</div>
    <div class="card-sub">🏢 Sala ${e.salas?.numero || ''} — ${e.salas?.nome_empresa || 'Sem nome'}</div>
    ${e.codigo_rastreio ? `<div class="card-sub">📦 ${e.codigo_rastreio}</div>` : ''}
    <div class="card-sub">⏰ ${new Date(e.criado_em).toLocaleString('pt-BR')}</div>
  </div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
    <span class="chip pendente">Pendente</span>
    ${e.foto_url ? `<img class="foto-thumb" src="${e.foto_url}" onclick="abrirFoto('${e.foto_url}',event)">` : ''}
  </div></div></div>`).join('')}`;
}

async function carregarReservas() {
  const hoje = new Date().toISOString().split('T')[0];
  const { data: reservas } = await db.from('reservas').select().gte('data', hoje).order('data').order('hora_inicio');
  const el = document.getElementById('reservas-content');
  if (!reservas?.length) { el.innerHTML = '<div class="empty"><div class="icon">📅</div>Nenhuma reserva próxima</div>'; return; }
  const porData = {};
  for (const r of reservas) { porData[r.data] = porData[r.data] || []; porData[r.data].push(r); }
  const isHoje = d => d === hoje;
  el.innerHTML = `<div class="section-title">🗓️ Próximas Reservas <span class="badge">${reservas.length}</span></div>
  ${Object.entries(porData).map(([data, lista]) => `
    <div class="data-header ${isHoje(data) ? 'hoje' : ''}">${isHoje(data) ? 'Hoje — ' : ''}${new Date(data+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div>
    ${lista.map(r => `<div class="card ${isHoje(data)?'reserva-hoje':''}"><div class="card-header"><div>
      <div class="card-title">${nomesEspacos(r.espaco_ids)}</div>
      <div class="card-sub">🕐 ${r.hora_inicio.substring(0,5)} — ${r.hora_fim.substring(0,5)}</div>
      <div class="card-sub">👤 ${r.responsavel_nome}</div>
    </div>${isHoje(data)?'<span class="chip hoje">Hoje</span>':''}</div>
    <div class="info-grid" style="margin-top:12px">
      ${r.num_pessoas?`<div class="info-item"><span>👥</span><div><div class="info-label">Pessoas</div><div class="info-value">${r.num_pessoas}</div></div></div>`:''}
      ${r.valor_total?`<div class="info-item"><span>💰</span><div><div class="info-label">Valor</div><div class="info-value">R$ ${parseFloat(r.valor_total).toFixed(2)}</div></div></div>`:''}
      ${r.num_cadeiras?`<div class="info-item"><span>🪑</span><div><div class="info-label">Cadeiras</div><div class="info-value">${r.num_cadeiras}</div></div></div>`:''}
      ${r.num_mesas?`<div class="info-item"><span>⬛</span><div><div class="info-label">Mesas</div><div class="info-value">${r.num_mesas}</div></div></div>`:''}
      ${r.observacoes?`<div class="info-item"><span>📝</span><div><div class="info-label">Obs</div><div class="info-value">${r.observacoes}</div></div></div>`:''}
    </div></div>`).join('')}`).join('')}`;
}

function mudarTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['encomendas','reservas','relatorios'][i]===tab));
  ['encomendas','reservas','relatorios'].forEach(t => document.getElementById(`tab-${t}`).classList.toggle('active', t===tab));
}

function abrirFoto(url,e) { e.stopPropagation(); document.getElementById('modal-img').src=url; document.getElementById('modal-foto').classList.add('open'); }
function fecharFoto() { document.getElementById('modal-foto').classList.remove('open'); }

// =================== RELATÓRIOS PDF ===================

async function buscarReservasPeriodo(dataInicio, dataFim) {
  const { data } = await db.from('reservas').select('*, salas(numero, nome_empresa)')
    .gte('data', dataInicio).lte('data', dataFim).order('data').order('hora_inicio');
  return data || [];
}

async function carregarLogoBase64() {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = () => resolve(null);
    img.src = 'nov(2).png';
  });
}

async function criarPDF(titulo, subtitulo) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFillColor(26, 35, 126);
  doc.rect(0, 0, 210, 30, 'F');
  const logoB64 = await carregarLogoBase64();
  if (logoB64) {
    doc.addImage(logoB64, 'PNG', 155, 3, 45, 24);
  }
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('Relatorio de Uso', 14, 13);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text(titulo, 14, 21);
  doc.setTextColor(0,0,0);
  doc.setFontSize(10);
  doc.text('Gerado em: ' + new Date().toLocaleString('pt-BR'), 14, 38);
  if (subtitulo) doc.text(subtitulo, 14, 44);
  return doc;
}

function adicionarTabelaReservas(doc, reservas, yStart) {
  if (!reservas.length) {
    doc.setFontSize(11); doc.setTextColor(150,150,150);
    doc.text('Nenhuma reserva encontrada no período.', 14, yStart + 10);
    doc.setTextColor(0,0,0);
    return yStart + 25;
  }

  const rows = reservas.map(r => [
    new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR'),
    nomesEspacos(r.espaco_ids),
    `${r.hora_inicio?.substring(0,5)} - ${r.hora_fim?.substring(0,5)}`,
    r.responsavel_nome || '',
    r.salas ? `${r.salas.numero}${r.salas.nome_empresa ? ' - '+r.salas.nome_empresa : ''}` : '',
    r.num_pessoas ? `${r.num_pessoas}p` : '-',
    r.valor_total ? `R$ ${parseFloat(r.valor_total).toFixed(2)}` : '-',
  ]);

  const total = reservas.reduce((s,r) => s + (parseFloat(r.valor_total)||0), 0);

  doc.autoTable({
    startY: yStart,
    head: [['Data','Espaço','Horário','Responsável','Sala','Pessoas','Valor']],
    body: rows,
    foot: [['','','','','','Total:', `R$ ${total.toFixed(2)}`]],
    headStyles: { fillColor: [26,35,126], textColor: 255, fontStyle: 'bold', fontSize: 9 },
    footStyles: { fillColor: [240,240,240], textColor: [26,35,126], fontStyle: 'bold' },
    bodyStyles: { fontSize: 8 },
    alternateRowStyles: { fillColor: [248,249,255] },
    columnStyles: { 0:{cellWidth:22}, 1:{cellWidth:38}, 2:{cellWidth:26}, 3:{cellWidth:32}, 4:{cellWidth:28}, 5:{cellWidth:16}, 6:{cellWidth:22} },
    margin: { left: 14, right: 14 },
  });

  return doc.lastAutoTable.finalY;
}

async function gerarRelatorioDia() {
  const data = document.getElementById('rel-dia-data').value;
  if (!data) { alert('Selecione uma data.'); return; }
  const reservas = await buscarReservasPeriodo(data, data);
  const dataFmt = new Date(data+'T12:00:00').toLocaleDateString('pt-BR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const doc = await criarPDF(`Período: ${dataFmt}`, `Total de reservas: ${reservas.length}`);
  adicionarTabelaReservas(doc, reservas, 52);
  doc.save(`relatorio-${data}.pdf`);
}

async function gerarRelatorioMes() {
  const mes = document.getElementById('rel-mes-data').value;
  if (!mes) { alert('Selecione um mês.'); return; }
  const [ano, m] = mes.split('-');
  const inicio = `${ano}-${m}-01`;
  const fim = new Date(ano, m, 0).toISOString().split('T')[0];
  const reservas = await buscarReservasPeriodo(inicio, fim);
  const mesFmt = new Date(ano, m-1).toLocaleDateString('pt-BR', {month:'long',year:'numeric'});
  const total = reservas.reduce((s,r) => s+(parseFloat(r.valor_total)||0), 0);
  const doc = await criarPDF(`Relatório Mensal: ${mesFmt}`, `Total de reservas: ${reservas.length} | Valor total: R$ ${total.toFixed(2)}`);

  // Agrupa por sala para resumo
  const porSala = {};
  reservas.forEach(r => {
    const key = r.salas ? `${r.salas.numero}${r.salas.nome_empresa?' - '+r.salas.nome_empresa:''}` : 'Portaria';
    porSala[key] = porSala[key] || { count: 0, valor: 0 };
    porSala[key].count++;
    porSala[key].valor += parseFloat(r.valor_total)||0;
  });

  // Resumo por sala
  doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text('Resumo por Sala', 14, 56);
  doc.autoTable({
    startY: 62,
    head: [['Sala','Qtd. Reservas','Valor Total']],
    body: Object.entries(porSala).map(([k,v]) => [k, v.count, `R$ ${v.valor.toFixed(2)}`]),
    headStyles: { fillColor: [26,35,126], textColor: 255, fontStyle: 'bold', fontSize: 10 },
    bodyStyles: { fontSize: 9 },
    alternateRowStyles: { fillColor: [248,249,255] },
    margin: { left: 14, right: 14 },
  });

  // Detalhamento completo
  doc.addPage();
  doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text('Detalhamento Completo', 14, 20);
  adicionarTabelaReservas(doc, reservas, 28);
  doc.save(`relatorio-${mes}.pdf`);
}

async function gerarRelatorioSala() {
  const numero = document.getElementById('rel-sala-numero').value;
  const tipo = document.getElementById('rel-sala-tipo').value;
  const dataVal = document.getElementById('rel-sala-data').value;
  if (!numero || !dataVal) { alert('Selecione a sala e o período.'); return; }

  let inicio, fim, periodoFmt;
  if (tipo === 'dia') {
    inicio = fim = dataVal;
    periodoFmt = new Date(dataVal+'T12:00:00').toLocaleDateString('pt-BR');
  } else {
    const [ano, m] = dataVal.split('-');
    inicio = `${ano}-${m}-01`;
    fim = new Date(ano, m, 0).toISOString().split('T')[0];
    periodoFmt = new Date(ano, m-1).toLocaleDateString('pt-BR', {month:'long',year:'numeric'});
  }

  const { data: sala } = await db.from('salas').select().eq('numero', numero).single();
  const { data: reservas } = await db.from('reservas').select()
    .eq('sala_id', sala.id).gte('data', inicio).lte('data', fim)
    .order('data').order('hora_inicio');

  const reservasFmt = (reservas||[]).map(r => ({ ...r, salas: { numero, nome_empresa: sala.nome_empresa } }));
  const total = reservasFmt.reduce((s,r) => s+(parseFloat(r.valor_total)||0), 0);
  const nomeSala = sala.nome_empresa ? `${numero} — ${sala.nome_empresa}` : `Sala ${numero}`;

  const doc = await criarPDF(`Sala: ${nomeSala} | Período: ${periodoFmt}`,
    `Total de reservas: ${reservasFmt.length} | Valor total: R$ ${total.toFixed(2)}`);
  adicionarTabelaReservas(doc, reservasFmt, 52);
  doc.save(`relatorio-sala-${numero}-${dataVal}.pdf`);
}

document.getElementById('senha').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
db.auth.getSession().then(({ data }) => { if (data.session) mostrarDashboard(); });
